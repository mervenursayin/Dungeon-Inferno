<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Dungeon Dice Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1> ⚔️ Dungeon Inferno </h1>

<div id="diceScreen" class="hidden">
  <h2 id="battleHeader">⚠️ GARDİYANLA SAVAŞ</h2>
  <div id="diceArea">
    <div class="dice-wrapper">
      <span>OYUNCU</span>
      <div id="playerDice" class="dice">?</div>
    </div>
    <div class="vs">VS</div>
    <div class="dice-wrapper">
      <span>Gardiyan</span>
      <div id="enemyDice" class="dice">?</div>
    </div>
  </div>
  <p id="battleStatus">Zar atarak kurtulmaya çalış!</p>
  <button id="rollBtn" onclick="rollDice()">🎲 Zar At</button>
</div>

<div id="gameContainer">
  <canvas id="gameCanvas" width="1200" height="600"></canvas>
</div>

<div id="statusBoard">
  ❤️ <span id="hpValue">10</span>
</div>

<div id="winScreen" class="hidden">
  <h2>🏆 TEBRİKLER!</h2>
  <p>Zindanın derinliklerinden sağ çıkmayı başardın!</p>
  <button onclick="location.reload()">🔄 Tekrar Oyna</button>
</div>


<div id="loseScreen" class="hidden">
  <h2>💀 OYUN BİTTİ</h2>
  <p>Zindanın karanlığında kayboldun...</p>
  <button onclick="location.reload()">🔄 Yeniden Dene</button>
</div>

<audio id="soundVictoryLoop" src="assets/sounds/victory_music.mp3" loop></audio>
<audio id="soundDiceShaking" src="assets/sounds/dice_roll.mp3" loop></audio>
<audio id="soundSuccess" src="assets/sounds/success.mp3"></audio>
<audio id="soundPotion" src="assets/sounds/potion.mp3"></audio>
<audio id="soundDefeat" src="assets/sounds/defeat.mp3"></audio>
<audio id="loopMusic" src="assets/sounds/loopmusic.mp3" loop preload="auto"></audio>
<audio id="soundStep" src="assets/sounds/taştekli.mp3"></audio>
<audio id="soundDamage" src="assets/sounds/damage.mp3"></audio>
<audio id="soundEncounter" src="assets/sounds/universfield-marimba-lose-250960.mp3"></audio>
<audio id="soundWin" src="assets/sounds/freesound_crunchpixstudio-material-gold-394476.mp3"></audio>
<audio id="soundVictoryAll" src="assets/sounds/victory_all.mp3"></audio>

<script src="game.js"></script>
</body>
</html>
